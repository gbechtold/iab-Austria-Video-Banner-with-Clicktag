<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="ad.size" content="width=300,height=600">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Video Banner 300x600</title>
<script type="text/javascript">
var clickTag = "https://www.example.com";
</script>
<style>
html, body {
  width: 300px;
  height: 600px;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #000;
}
#contentWrapper {
  position: relative;
  width: 300px;
  height: 600px;
}
#video {
  position: absolute;
  top: 0;
  left: 0;
  width: 300px;
  height: 600px;
  z-index: 100;
  border: 0;
  object-fit: cover;
}
.fallback-image {
  position: absolute;
  top: 0;
  left: 0;
  width: 300px;
  height: 600px;
  z-index: 90;
  display: none;
  object-fit: cover;
}
#ct {
  width: 300px;
  height: 600px;
  z-index: 9999;
  position: absolute;
  top: 0;
  left: 0;
  cursor: pointer;
  background: transparent;
}
#muteBtn {
  position: absolute;
  z-index: 10000;
  bottom: 8px; left: 8px;
  width: 30px;
  height: 30px;
  background: rgba(0,0,0,0.5);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.7;
  transition: opacity 0.2s;
  padding: 0;
}
#muteBtn:hover {
  opacity: 1;
}
#muteBtn svg {
  width: 20px;
  height: 20px;
  fill: #fff;
}
</style>
</head>
<body>
<div id="contentWrapper">
  <video id="video" width="300" height="600"
         controlsList="nodownload" autoplay autobuffer loop muted
         playsinline preload="metadata">
    <source src="video.mp4" type="video/mp4">
  </video>
  <img src="fallback.jpg" alt="Banner" class="fallback-image" id="fallbackImg">
  <div id="ct"></div>
  <button id="muteBtn" title="Ton ein/aus">
    <svg id="iconMuted" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
    <svg id="iconUnmuted" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none;">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </button>
</div>

<script type="text/javascript">
(function() {
  var video = document.getElementById('video');
  var fallback = document.getElementById('fallbackImg');
  var muteBtn = document.getElementById('muteBtn');
  var iconMuted = document.getElementById('iconMuted');
  var iconUnmuted = document.getElementById('iconUnmuted');
  var ct = document.getElementById('ct');

  // Video init
  video.volume = 0.65;
  video.play().catch(function() {
    fallback.style.display = 'block';
  });

  video.addEventListener('error', function() {
    fallback.style.display = 'block';
  });

  // Mute toggle
  muteBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    e.preventDefault();
    if (video.muted) {
      video.muted = false;
      iconMuted.style.display = 'none';
      iconUnmuted.style.display = 'block';
    } else {
      video.muted = true;
      iconMuted.style.display = 'block';
      iconUnmuted.style.display = 'none';
    }
  });

  // Google Ad Manager clickTag handler
  ct.addEventListener('click', function() {
    window.open(window.clickTag);
  });
})();
</script>
</body>
</html>
